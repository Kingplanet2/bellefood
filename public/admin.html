<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Belle Food — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --orange: #E8400A;
    --gold: #F5A623;
    --dark: #0D0D0D;
    --dark-2: #111111;
    --dark-3: #181818;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --text: #FFFFFF;
    --text-muted: rgba(255,255,255,0.5);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--text); font-family:'Outfit',sans-serif; min-height:100vh; }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    background: var(--dark-2);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 48px;
    width: 100%;
    max-width: 420px;
  }
  .login-logo {
    font-size: 2rem;
    font-weight: 900;
    margin-bottom: 8px;
    text-align: center;
  }
  .login-logo span { color: var(--orange); }
  .login-subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 40px;
  }
  .login-label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .login-input {
    width: 100%;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    outline: none;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--orange); }
  .login-btn {
    width: 100%;
    background: var(--orange);
    color: white;
    padding: 16px;
    border-radius: 12px;
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    border: none;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 32px rgba(232,64,10,0.4);
    margin-top: 8px;
  }
  .login-btn:hover { transform: translateY(-2px); }
  .login-error {
    color: #ff6b6b;
    font-size: 0.85rem;
    text-align: center;
    margin-top: 16px;
    display: none;
  }
  .login-error.visible { display: block; }

  /* ── DASHBOARD ── */
  #dashboard { display: none; }
  nav {
    background: var(--dark-2);
    border-bottom: 1px solid var(--glass-border);
    padding: 20px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-logo { font-size: 1.6rem; font-weight: 900; }
  .nav-logo span { color: var(--orange); }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-tag {
    background: var(--orange);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 700;
  }
  .logout-btn {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--text-muted);
    padding: 6px 16px;
    border-radius: 100px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--orange); color: var(--orange); }
  .container { max-width: 1280px; margin: 0 auto; padding: 48px; }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 48px;
  }
  .stat-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 24px;
  }
  .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .stat-value { font-size: 2rem; font-weight: 900; color: var(--gold); }
  .section-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 24px; }
  .section-title span { color: var(--orange); }
  .filters { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn {
    padding: 8px 20px;
    border-radius: 100px;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover { background: var(--orange); border-color: var(--orange); color: white; }
  .orders-list { display: flex; flex-direction: column; gap: 16px; }
  .order-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 24px;
    transition: border-color 0.2s;
  }
  .order-card:hover { border-color: rgba(232,64,10,0.3); }
  .order-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .order-customer { font-size: 1.1rem; font-weight: 800; }
  .order-time { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
  .order-total { font-size: 1.4rem; font-weight: 900; color: var(--gold); }
  .order-items { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .order-item-tag {
    background: var(--dark-3);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.8rem;
  }
  .order-details { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
  .order-detail { font-size: 0.85rem; color: var(--text-muted); }
  .order-detail strong { color: var(--text); }
  .order-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding-top: 16px;
    border-top: 1px solid var(--glass-border);
  }
  .status-badge {
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .status-received { background: rgba(245,166,35,0.15); color: var(--gold); border: 1px solid rgba(245,166,35,0.3); }
  .status-preparing { background: rgba(232,64,10,0.15); color: var(--orange); border: 1px solid rgba(232,64,10,0.3); }
  .status-ready { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
  .status-delivered { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }
  .status-select {
    background: var(--dark-3);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 8px 16px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    outline: none;
  }
  .payment-badge { padding: 4px 12px; border-radius: 100px; font-size: 0.72rem; font-weight: 700; }
  .payment-paid { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
  .payment-pending { background: rgba(245,166,35,0.15); color: var(--gold); border: 1px solid rgba(245,166,35,0.3); }
  .empty-state { text-align: center; padding: 80px 40px; color: var(--text-muted); }
  .empty-icon { font-size: 4rem; margin-bottom: 16px; }
  .loading { text-align: center; padding: 80px; color: var(--text-muted); font-size: 1.1rem; }
  @media(max-width:768px) {
    .container { padding: 24px; }
    nav { padding: 16px 24px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Belle<span>Food</span></div>
    <div class="login-subtitle">Admin Dashboard — Authorized Access Only</div>
    <label class="login-label">Username</label>
    <input class="login-input" id="admin-username" type="text" placeholder="Enter username"/>
    <label class="login-label">Password</label>
    <input class="login-input" id="admin-password" type="password" placeholder="Enter password"
      onkeydown="if(event.key==='Enter') login()"/>
    <button class="login-btn" onclick="login()">🔐 Login to Dashboard</button>
    <div class="login-error" id="login-error">Incorrect username or password</div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <nav>
    <div class="nav-logo">Belle<span>Food</span> Admin</div>
    <div class="nav-right">
      <div class="nav-tag">Dashboard</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value" id="stat-revenue">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="stat-pending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Delivered</div>
        <div class="stat-value" id="stat-delivered">—</div>
      </div>
    </div>

    <div class="section-title">All <span>Orders</span></div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterOrders('all', this)">All</button>
      <button class="filter-btn" onclick="filterOrders('received', this)">Received</button>
      <button class="filter-btn" onclick="filterOrders('preparing', this)">Preparing</button>
      <button class="filter-btn" onclick="filterOrders('ready', this)">Ready</button>
      <button class="filter-btn" onclick="filterOrders('delivered', this)">Delivered</button>
    </div>

    <div class="orders-list" id="orders-list">
      <div class="loading">Loading orders...</div>
    </div>
  </div>
</div>

<script>
const API = 'https://bellefood-backend.onrender.com';

// ── CHANGE THESE TO YOUR OWN USERNAME AND PASSWORD ──
const ADMIN_USERNAME = 'bellefood';
const ADMIN_PASSWORD = 'merrybet1';

let allOrders = [];
let currentFilter = 'all';

function login() {
  const username = document.getElementById('admin-username').value.trim();
  const password = document.getElementById('admin-password').value.trim();

  if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
    sessionStorage.setItem('bf_admin', 'true');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadOrders();
  } else {
    document.getElementById('login-error').classList.add('visible');
  }
}

function logout() {
  sessionStorage.removeItem('bf_admin');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('admin-username').value = '';
  document.getElementById('admin-password').value = '';
}

// Check if already logged in
if (sessionStorage.getItem('bf_admin') === 'true') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadOrders();
}

async function loadOrders() {
  try {
    const res = await fetch(API + '/orders');
    allOrders = await res.json();
    updateStats();
    renderOrders();
  } catch (err) {
    document.getElementById('orders-list').innerHTML =
      '<div class="empty-state"><div class="empty-icon">❌</div><p>Could not load orders. Make sure your backend is running.</p></div>';
  }
}

function updateStats() {
  const total = allOrders.length;
  const revenue = allOrders.reduce((sum, o) => sum + (o.total || 0), 0);
  const pending = allOrders.filter(o => o.status === 'received' || o.status === 'preparing').length;
  const delivered = allOrders.filter(o => o.status === 'delivered').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-revenue').textContent = 'N' + revenue.toLocaleString('en-NG');
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-delivered').textContent = delivered;
}

function filterOrders(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const filtered = currentFilter === 'all'
    ? allOrders
    : allOrders.filter(o => o.status === currentFilter);

  const list = document.getElementById('orders-list');

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🍽️</div><p>No orders in this category yet.</p></div>';
    return;
  }

  list.innerHTML = filtered.map(order => {
    const date = new Date(order.createdAt).toLocaleString('en-NG');
    const items = (order.items || []).map(item =>
      '<span class="order-item-tag">' + item.emoji + ' ' + item.name + ' x' + item.qty + '</span>'
    ).join('');

    return '<div class="order-card">' +
      '<div class="order-top">' +
        '<div>' +
          '<div class="order-customer">' + (order.customer ? order.customer.name : 'Unknown') + '</div>' +
          '<div class="order-time">' + date + '</div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:12px;">' +
          '<span class="payment-badge ' + (order.paymentStatus === 'paid' ? 'payment-paid' : 'payment-pending') + '">' +
            (order.paymentStatus === 'paid' ? 'Paid' : 'Pending') +
          '</span>' +
          '<div class="order-total">N' + (order.total || 0).toLocaleString('en-NG') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="order-items">' + items + '</div>' +
      '<div class="order-details">' +
        '<div class="order-detail"><strong>Phone:</strong> ' + (order.customer ? order.customer.phone : '—') + '</div>' +
        '<div class="order-detail"><strong>Address:</strong> ' + (order.customer ? order.customer.address : '—') + '</div>' +
        (order.customer && order.customer.note ? '<div class="order-detail"><strong>Note:</strong> ' + order.customer.note + '</div>' : '') +
      '</div>' +
      '<div class="order-bottom">' +
        '<span class="status-badge status-' + order.status + '">' + order.status + '</span>' +
        '<select class="status-select" onchange="updateStatus(\'' + order._id + '\', this.value)">' +
          '<option value="received"' + (order.status === 'received' ? ' selected' : '') + '>Received</option>' +
          '<option value="preparing"' + (order.status === 'preparing' ? ' selected' : '') + '>Preparing</option>' +
          '<option value="ready"' + (order.status === 'ready' ? ' selected' : '') + '>Ready</option>' +
          '<option value="delivered"' + (order.status === 'delivered' ? ' selected' : '') + '>Delivered</option>' +
        '</select>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function updateStatus(orderId, newStatus) {
  try {
    await fetch(API + '/orders/' + orderId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus }),
    });
    await loadOrders();
  } catch (err) {
    alert('Could not update order status.');
  }
}

setInterval(loadOrders, 30000);
</script>
</body>
</html>
